<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Message</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 400;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #333;
            background: #252525;
            color: white;
            border-radius: 4px;
            box-sizing: border-box; /* Wichtig für das Padding */
        }

        input:focus {
            border-color: #5865F2; /* Discord-Blau */
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #dddddd;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Send message to owner</h2>
        <input type="text" id="msg" placeholder="Deine Nachricht..." autocomplete="off">
        <button id="btn" onclick="send()">Send</button>
    </div>

    <script>
        async function send() {
            const url = "DEINE_DISCORD_WEBHOOK_URL_HIER"; // <--- Deine URL hier rein
            const input = document.getElementById('msg');
            const btn = document.getElementById('btn');

            if (!input.value.trim()) return;

            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: input.value })
                });

                if (res.ok) {
                    input.value = "";
                    alert("Gesendet!");
                } else {
                    alert("Fehler!");
                }
            } catch (e) {
                alert("Verbindungsfehler!");
            } finally {
                btn.disabled = false;
                btn.innerText = "Send";
            }
        }
    </script>

</body>
</html>
